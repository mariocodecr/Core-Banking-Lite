name: CD — Deploy to Cloud Run

on:
  push:
    branches:
      - main

# Required secrets:
#   GCP_PROJECT_ID       — GCP project identifier
#   GCP_SA_KEY           — Service account JSON key with Cloud Run and Artifact Registry permissions
#   JWT_SECRET           — 256-bit hex JWT signing secret
#   DATABASE_URL         — Cloud SQL JDBC URL (jdbc:postgresql://...)
#   DATABASE_USERNAME    — DB username
#   DATABASE_PASSWORD    — DB password

env:
  GCP_REGION:       us-central1
  BACKEND_SERVICE:  corebanking-backend
  FRONTEND_SERVICE: corebanking-frontend
  REGISTRY:         ghcr.io
  BACKEND_IMAGE:    ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE:   ghcr.io/${{ github.repository }}/frontend

jobs:
  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy backend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.BACKEND_SERVICE }}
          region:  ${{ env.GCP_REGION }}
          image:   ${{ env.BACKEND_IMAGE }}:main
          flags: "--allow-unauthenticated --port=8080 --memory=512Mi --cpu=1 --min-instances=0 --max-instances=3"
          env_vars: |
            SPRING_PROFILES_ACTIVE=prod
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            DATABASE_USERNAME=${{ secrets.DATABASE_USERNAME }}
            DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            CORS_ALLOWED_ORIGINS=https://${{ env.FRONTEND_SERVICE }}-${{ secrets.GCP_PROJECT_ID }}.a.run.app

  deploy-frontend:
    name: Deploy Frontend to Cloud Run
    runs-on: ubuntu-latest
    needs: deploy-backend
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get backend URL
        id: backend-url
        run: |
          URL=$(gcloud run services describe ${{ env.BACKEND_SERVICE }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "url=${URL}/api" >> "$GITHUB_OUTPUT"

      - name: Deploy frontend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.FRONTEND_SERVICE }}
          region:  ${{ env.GCP_REGION }}
          image:   ${{ env.FRONTEND_IMAGE }}:main
          flags: "--allow-unauthenticated --port=3000 --memory=256Mi --cpu=1 --min-instances=0 --max-instances=3"
          env_vars: |
            NEXT_PUBLIC_API_URL=${{ steps.backend-url.outputs.url }}
